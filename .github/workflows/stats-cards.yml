name: Update README cards

on:
  push:
    branches:
      - main # 替换为您项目的主分支名，例如 master 或 main
  schedule: # 每天 UTC 时间 0 点（北京时间 8 点）运行一次
    - cron: "0 0 * * *"
  workflow_dispatch: # 保留手动触发按钮，方便随时测试

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予 GITHUB_TOKEN 写权限才能 push 代码
    steps:
      - uses: actions/checkout@v4

      - name: Ensure profile directory exists
        run: mkdir -p profile # 确保 profile 文件夹存在，否则写入或 add 可能会报错

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: profile/pin-readme-tools-github-readme-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update GitHub stats cards automatically [skip ci]" || exit 0
          git push